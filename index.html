<script>

const API="https://script.google.com/macros/s/AKfycbyZXHV6N2ZJv7cjO7fIJu2l-jt-iQpiCQhU9Jh1oSy3fIgPf8_qTrTz9_atPP4-nZmmcA/exec";

let nome="";
let funcional="";

async function login(){

funcional=document.getElementById("funcional").value;
let senha=document.getElementById("senha").value;

try{

let resposta = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
acao:"login",
funcional:funcional,
senha:senha
})
});

let dados = await resposta.json();

if(dados.status=="ok"){

nome=dados.nome;

document.getElementById("sistema").style.display="block";

alert("Bem vindo "+nome)

}else{

alert("Login inválido")

}

}catch(erro){

alert("Erro de conexão com servidor")

}

}

async function cautelar(){

if(!document.getElementById("confirmacao").checked){

alert("Confirme a conferência")
return

}

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

acao:"cautela",

nome:nome,

funcional:funcional,

arma:document.getElementById("arma").value,

numero:document.getElementById("numero").value,

municao:document.getElementById("municao").value

})
})

alert("Cautela registrada")

}

async function descautelar(){

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

acao:"descautela",

nome:nome,

funcional:funcional,

arma:document.getElementById("arma").value,

numero:document.getElementById("numero").value,

municao:document.getElementById("municao").value

})
})

alert("Descautela registrada")

}

</script>
